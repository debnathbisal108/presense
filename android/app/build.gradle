// android/app/build.gradle
// PreSense AI — Android app-level build configuration

apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

/**
 * React Native configuration
 */
react {
    /* Folders */
    root = file("../")
    reactNativeDir = file("../node_modules/react-native")
    codegenDir = file("../node_modules/@react-native/codegen")
    cliFile = file("../node_modules/react-native/cli.js")

    /* Bundling */
    bundleAssetName = "index.android.bundle"
    entryFile = file("../index.js")

    /* Hermes JS engine (faster startup, lower memory) */
    enableHermes = true
}

/**
 * Release signing configuration.
 * Values are read from environment variables set by the CI workflow
 * (never hardcoded — keystore stays out of source control).
 *
 * Local development: create android/keystore.properties with:
 *   storeFile=presense-release.jks
 *   storePassword=YOUR_PASSWORD
 *   keyAlias=YOUR_ALIAS
 *   keyPassword=YOUR_KEY_PASSWORD
 */
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.presenseai"
    compileSdk rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId "com.presenseai"
        minSdk rootProject.ext.minSdkVersion         // 26 (Android 8.0+)
        targetSdk rootProject.ext.targetSdkVersion   // 34
        versionCode  1
        versionName  "1.0.0"

        // Enable multidex for large dependency tree
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        release {
            // Prefer environment variables (CI) → fall back to keystore.properties (local)
            if (System.getenv("PRESENSE_KEYSTORE_PATH")) {
                storeFile     file(System.getenv("PRESENSE_KEYSTORE_PATH"))
                storePassword System.getenv("PRESENSE_KEYSTORE_PASSWORD")
                keyAlias      System.getenv("PRESENSE_KEY_ALIAS")
                keyPassword   System.getenv("PRESENSE_KEY_PASSWORD")
            } else if (keystorePropertiesFile.exists()) {
                storeFile     file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias      keystoreProperties['keyAlias']
                keyPassword   keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
            // Disable Proguard in debug for faster builds
            minifyEnabled false
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }

        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"

            // Strip debug symbols for smaller release APK
            debuggable false
        }
    }

    // Enable NNAPI / hardware acceleration for TFLite
    aaptOptions {
        noCompress "tflite", "onnx"     // Don't compress ML model files
    }

    splits {
        // Generate per-ABI APKs for smaller download size on Play Store
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
            universalApk true  // also generate a universal APK
        }
    }

    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libfbjni.so'
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // Health Connect
    implementation "androidx.health.connect:connect-client:1.1.0-alpha07"

    // TFLite (on-device inference)
    implementation 'org.tensorflow:tensorflow-lite:2.14.0'
    implementation 'org.tensorflow:tensorflow-lite-gpu:2.14.0'        // GPU delegate
    implementation 'org.tensorflow:tensorflow-lite-support:0.4.4'
    implementation 'org.tensorflow:tensorflow-lite-task-vision:0.4.4' // optional

    // NNAPI delegate (hardware acceleration on supported devices)
    implementation 'org.tensorflow:tensorflow-lite-gpu-delegate-plugin:0.4.4'

    // Multidex
    implementation "androidx.multidex:multidex:2.0.1"
}

// Ensure the TFLite model is copied to assets before build
preBuild.dependsOn {
    tasks.register('validateModel') {
        doLast {
            def modelFile = file("src/main/assets/presense_model.tflite")
            if (!modelFile.exists() || modelFile.length() == 0) {
                logger.warn("⚠️  WARNING: presense_model.tflite is missing or empty.")
                logger.warn("   The app will use JS fallback weights.")
                logger.warn("   See MODEL_PLACEMENT.md for setup instructions.")
            } else {
                logger.info("✅ TFLite model found: ${modelFile.length()} bytes")
            }
        }
    }
}
