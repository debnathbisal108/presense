apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

android {
    namespace "com.presense"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.presense"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {}

        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

// ←←← Add this block
project.ext.react = [
    enableHermes: false,
    enableVmCleanup: false,   // This fixes many Hermes native crashes on startup
]

dependencies {
    implementation("com.facebook.react:react-android")
}
