# .github/dependabot.yml
# Automated dependency update configuration for PreSense AI

version: 2

updates:
  # ── npm (JS/React Native dependencies) ────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      # Group React Navigation updates together
      react-navigation:
        patterns:
          - '@react-navigation/*'
      # Group React Native core patches
      react-native-core:
        patterns:
          - 'react'
          - 'react-native'
    ignore:
      # Don't auto-update major versions of core RN
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'
      - 'javascript'
    commit-message:
      prefix: 'chore(deps)'

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(ci)'

  # ── Gradle (Android) ───────────────────────────────────────────────────────
  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: monthly
    labels:
      - 'dependencies'
      - 'android'
    commit-message:
      prefix: 'chore(android)'
