# .github/workflows/android.yml
# ─────────────────────────────────────────────────────────────────────────────
# PreSense AI — Android Build Pipeline
#
# Triggers:
#   • Push to main / develop → debug APK (smoke test)
#   • Pull requests         → debug APK + lint
#   • Tags v*.*.* / release branch → signed release AAB → Google Play (optional)
#   • Manual dispatch       → choose build type
#
# Secrets required (Settings → Secrets → Actions):
#   KEYSTORE_BASE64        Base64-encoded .jks release keystore
#   KEYSTORE_PASSWORD      Keystore password
#   KEY_ALIAS              Key alias inside keystore
#   KEY_PASSWORD           Key password
#   GOOGLE_PLAY_JSON_KEY   (optional) Service account JSON for Play upload
# ─────────────────────────────────────────────────────────────────────────────

name: 🤖 Android Build

on:
  push:
    branches: [main, develop]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

# Cancel in-flight runs for the same branch
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION:  '20'
  JAVA_VERSION:  '17'
  # React Native bundler settings
  GRADLE_OPTS:   '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true'

jobs:
  # ── Job 1: Lint & Type-check ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint "src/**/*.{ts,tsx}" --max-warnings 0

  # ── Job 2: Android Debug Build ───────────────────────────────────────────
  android-debug:
    name: 🔨 Android Debug APK
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) || (github.event.inputs.build_type == 'debug')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      # Cache Gradle build artifacts for faster subsequent runs
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # Place the TFLite model into Android assets
      - name: Place TFLite model
        run: |
          mkdir -p android/app/src/main/assets
          # In CI, use a placeholder if no model secret is set.
          # In production, store the model as a GitHub secret (base64) or
          # in Git LFS and restore here.
          if [ -n "${{ secrets.MODEL_TFLITE_BASE64 }}" ]; then
            echo "${{ secrets.MODEL_TFLITE_BASE64 }}" | base64 -d \
              > android/app/src/main/assets/presense_model.tflite
            echo "✅ TFLite model restored from secret"
          else
            # Create a minimal valid placeholder so the build doesn't fail
            # The app will fall back to JS weights at runtime
            touch android/app/src/main/assets/presense_model.tflite
            echo "⚠️  No model secret found — using empty placeholder"
          fi

      - name: Bundle JS (Metro)
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: presense-ai-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Comment APK size on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'android/app/build/outputs/apk/debug/app-debug.apk';
            const stats = fs.statSync(path);
            const mb = (stats.size / 1024 / 1024).toFixed(1);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Android Debug Build\n\n✅ Build successful\n📦 APK size: **${mb} MB**\n🔗 Download from [Actions artifacts](${context.payload.pull_request.html_url}/checks)`
            });

  # ── Job 3: Android Release Build ─────────────────────────────────────────
  android-release:
    name: 🚀 Android Release AAB
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/release' || (github.event.inputs.build_type == 'release')
    environment: production   # requires manual approval if configured

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-release-${{ runner.os }}-

      # Restore keystore from base64 secret
      - name: Decode & place keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d \
            > android/app/presense-release.jks
          echo "✅ Keystore decoded"

      # Restore TFLite model
      - name: Place TFLite model
        run: |
          mkdir -p android/app/src/main/assets
          echo "${{ secrets.MODEL_TFLITE_BASE64 }}" | base64 -d \
            > android/app/src/main/assets/presense_model.tflite

      - name: Bundle JS (production)
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build release AAB
        working-directory: android
        env:
          PRESENSE_KEYSTORE_PATH:     presense-release.jks
          PRESENSE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PRESENSE_KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          PRESENSE_KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Build release APK (for direct distribution)
        working-directory: android
        env:
          PRESENSE_KEYSTORE_PATH:     presense-release.jks
          PRESENSE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PRESENSE_KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          PRESENSE_KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: presense-ai-release-${{ github.ref_name }}
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # Optional: upload to Google Play Internal Testing track
      # - name: Upload to Google Play (Internal Testing)
      #   if: ${{ secrets.GOOGLE_PLAY_JSON_KEY != '' }}
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
      #     packageName: com.presenseai
      #     releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
      #     track: internal
      #     status: completed
      #     whatsNewDirectory: distribution/whatsnew

      # Create GitHub Release on tag push
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          draft: false

      # Security: shred keystore after build
      - name: Cleanup keystore
        if: always()
        run: shred -u android/app/presense-release.jks || true
